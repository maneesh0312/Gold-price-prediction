<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Gold Price Prediction</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-header text-center bg-warning">
<h3>Gold Price Prediction</h3>
</div>

<div class="card-body">

<form action="/predict" method="post">

<div class="mb-3">
<label class="form-label">Open Price</label>
<input type="number" step="any" class="form-control" name="Open" required>
</div>

<div class="mb-3">
<label class="form-label">High Price</label>
<input type="number" step="any" class="form-control" name="High" required>
</div>

<div class="mb-3">
<label class="form-label">Low Price</label>
<input type="number" step="any" class="form-control" name="Low" required>
</div>

<div class="mb-3">
<label class="form-label">Volume</label>
<input type="number" step="any" class="form-control" name="Volume" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-warning">Predict Price</button>
</div>

</form>

{% if prediction_text %}
<div class="alert alert-success mt-4 text-center">
<strong>{{ prediction_text }}</strong>
</div>
{% endif %}

</div>

</div>

</div>

</div>

</div>

</body>
</html>
